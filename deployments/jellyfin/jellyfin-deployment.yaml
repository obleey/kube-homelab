apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: servarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: k3s-server-1
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          envFrom:
            - configMapRef:
                name: jellyfin-config
          ports:
            - containerPort: 8096
            - containerPort: 7359
              protocol: UDP
            - containerPort: 1900
              protocol: UDP
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: servarr-data
              mountPath: /data/media
              subPath: media
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: servarr-data
          persistentVolumeClaim:
            claimName: servarr-data
