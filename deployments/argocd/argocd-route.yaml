apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "argocd.k3s-cluster.local.obleey.com"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
