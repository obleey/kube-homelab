apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: servarr-apps
  namespace: argocd
spec:
  commonUpdateSettings:
    updateStrategy: latest
  writeBackConfig:
    method: git
    git:
      branch: main
  applicationRefs:
    - namePattern: sonarr
      images:
        - alias: sonarr
          imageName: lscr.io/linuxserver/sonarr
    - namePattern: prowlarr
      images:
        - alias: prowlarr
          imageName: lscr.io/linuxserver/prowlarr
    - namePattern: jellyfin
      images:
        - alias: jellyfin
          imageName: lscr.io/linuxserver/jellyfin
    - namePattern: qbittorrent
      images:
        - alias: qbittorrent
          imageName: lscr.io/linuxserver/qbittorrent
