apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: servarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: k3s-server-1
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:latest
          envFrom:
            - configMapRef:
                name: plex-config
            - secretRef:
                name: plex-secret
          ports:
            - containerPort: 32400
            - containerPort: 8324
            - containerPort: 32469
            - containerPort: 5353
              protocol: UDP
            - containerPort: 1900
              protocol: UDP
            - containerPort: 32410
              protocol: UDP
            - containerPort: 32412
              protocol: UDP
            - containerPort: 32413
              protocol: UDP
            - containerPort: 32414
              protocol: UDP
          volumeMounts:
            - name: plex-config
              mountPath: /config
            - name: servarr-data
              mountPath: /data
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: plex-config
        - name: servarr-data
          persistentVolumeClaim:
            claimName: servarr-data
